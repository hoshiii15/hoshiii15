name: Update Rakahomelab Status Screenshot

on:
  schedule:
    - cron: '0 * * * *' # Mlaku otomatis saben 1 jam
  workflow_dispatch:     # Tombol manual "Run" neng tab Actions

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:         # WAJIB: Ben roboté isoh nge-push gambar neng repo
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Take Screenshot
        uses: flamingostack/screenshot-action@v1.4.0
        with:
          url: https://uptimekuma.rakahomelab.my.id/status/server # Cek domain-é meneh yo!
          output: status_screenshot.png
          width: 1280
          height: 720
          delay: 5000 # Ngenteni 5 detik ben grafike metu kabeh nembe difoto

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update server status heartbeat screenshot 📸"
          file_pattern: 'status_screenshot.png'
